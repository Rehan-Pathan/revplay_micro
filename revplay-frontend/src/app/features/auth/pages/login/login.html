<div class="flex items-center justify-center min-h-screen bg-backgroundDark">

    <div class="w-full max-w-md p-8 rounded-lg bg-surfaceDark shadow-lg">

        <h2 class="text-2xl font-bold text-center text-white mb-6">
            Login
        </h2>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">

            <div>
                <label class="block text-sm text-gray-300 mb-1">
                   Email
                </label>

                <input type="text" formControlName="email"
                    class="w-full px-3 py-2 rounded-md bg-surfaceLight text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-green-500"
                    placeholder="Enter email" />
            </div>

            <div>
                <label class="block text-sm text-gray-300 mb-1">
                    Password
                </label>

                <input type="password" formControlName="password"
                    class="w-full px-3 py-2 rounded-md bg-surfaceLight text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-green-500"
                    placeholder="Enter password" />
            </div>

            <button type="submit"
                class="w-full py-2 rounded-md bg-green-600 hover:bg-green-700 transition text-white font-semibold">
                Login
            </button>

            <div class="text-center mt-4">
                <span class="text-gray-400 text-sm">
                    New user?
                </span>
                <a routerLink="/register" class="text-green-500 hover:underline text-sm ml-1">
                    Register here
                </a>
            </div>

        </form>

    </div>

</div>
