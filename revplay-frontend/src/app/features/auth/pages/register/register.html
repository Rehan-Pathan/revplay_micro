<div class="flex items-center justify-center min-h-screen bg-backgroundDark">

    <div class="w-full max-w-lg p-8 rounded-lg bg-surfaceDark shadow-lg">

        <h2 class="text-2xl font-bold text-center text-white mb-6">
            Create Account
        </h2>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">

            <div>
                <label class="block text-sm text-gray-300 mb-1">
                    Register As
                </label>

                <select formControlName="role" class="input-style">

                    <option value="USER">User</option>
                    <option value="ARTIST">Artist</option>

                </select>
            </div>

            <input type="text" formControlName="username" placeholder="Username" class="input-style" />

            <input type="email" formControlName="email" placeholder="Email" class="input-style" />

            <input type="password" formControlName="password" placeholder="Password" class="input-style" />

            

            <textarea formControlName="bio" placeholder="Bio" class="input-style"></textarea>

            <select formControlName="gender" class="input-style">
                <option value="">Select Gender</option>
                <option value="MALE">Male</option>
                <option value="FEMALE">Female</option>
                <option value="OTHER">Other</option>
            </select>

            <input type="file" (change)="onFileSelected($event)" class="text-white" />

            <button type="submit"
                class="w-full py-2 rounded-md bg-green-600 hover:bg-green-700 transition text-white font-semibold">
                Register
            </button>

            <div class="text-center text-sm text-gray-400">
                Already have account?
                <a routerLink="/login" class="text-green-500 hover:underline">
                    Login
                </a>
            </div>

        </form>

    </div>

</div>
