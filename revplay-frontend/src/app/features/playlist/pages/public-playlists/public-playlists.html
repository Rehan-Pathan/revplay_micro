<div class="p-8 text-white">

    <h1 class="text-3xl font-bold mb-8">🌍 Public Playlists</h1>

    @if (loading) {
    <div class="flex justify-center mt-20">
        <div class="w-6 h-6 border-4 border-green-500 border-t-transparent rounded-full animate-spin"></div>
    </div>
    }

    @if (!loading) {

    <div class="grid grid-cols-4 gap-6">

        @for (playlist of playlists; track playlist.id) {

        <div class="relative bg-surfaceDark p-4 rounded-xl hover:bg-surfaceLight transition-all duration-300 hover:scale-105 cursor-pointer group"
            (click)="openPlaylist(playlist.id)">

            <div
                class="w-full h-40 bg-gradient-to-br from-purple-600 to-green-500 rounded-lg mb-4 flex items-center justify-center text-4xl">
                🎵
            </div>

            <button (click)="toggleFollow(playlist, $event)"
                class="absolute bottom-3 right-3 px-3 py-1 text-xs rounded-full transition" [ngClass]="followedIds.has(playlist.id)
    ? 'bg-gray-600 text-white'
    : 'bg-green-600 text-white hover:bg-green-700'">

                {{ followedIds.has(playlist.id) ? 'Following' : 'Follow' }}

            </button>

            <h3 class="font-semibold truncate">
                {{ playlist.name }}
            </h3>

            <p class="text-gray-400 text-sm truncate">
                {{ playlist.description }}
            </p>

            <div class="flex justify-between items-center mt-3 text-xs text-gray-400">
                <span>{{ playlist.totalSongs }} Songs</span>
                <span class="text-green-400">Public</span>
            </div>

            <div class="text-xs text-gray-500 mt-1">
                By {{ playlist.ownerUsername }}
            </div>

        </div>

        }

    </div>

    <!-- Pagination -->
    <div class="flex justify-center gap-4 mt-10">

        <button (click)="prevPage()" class="bg-gray-700 px-4 py-2 rounded-full hover:bg-gray-600"
            [disabled]="page === 0">
            Previous
        </button>

        <button (click)="nextPage()" class="bg-green-600 px-4 py-2 rounded-full hover:bg-green-700"
            [disabled]="page >= totalPages - 1">
            Next
        </button>

    </div>

    }

</div>
