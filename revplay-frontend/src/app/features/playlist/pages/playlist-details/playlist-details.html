<div class="p-8 text-white">

    <!-- @if (loading) {
    <div class="flex justify-center mt-20">
        <div class="w-6 h-6 border-4 border-green-500 border-t-transparent rounded-full animate-spin"></div>
    </div>
    }

    @if (!loading) { -->

    <!-- Header Section -->
    <div class="flex items-center gap-8 mb-10">

        <!-- Cover -->
        <div
            class="w-56 h-56 bg-gradient-to-br from-purple-600 to-green-500 rounded-xl flex items-center justify-center text-6xl">
            🎵
        </div>

        <!-- Info -->
        <div>

            <p class="uppercase text-sm text-gray-400">Playlist</p>

            @if (!editMode) {

            <h1 class="text-4xl font-bold">
                {{ playlist?.name }}
            </h1>

            <p class="text-gray-400 mt-2">
                {{ playlist?.description }}
            </p>

            <div class="mt-4 text-sm text-gray-400 flex gap-4">
                <span>{{ playlist?.ownerUsername }}</span>
                <span>•</span>
                <span>{{ playlist?.totalSongs }} songs</span>
                <span>•</span>
                <button *ngIf="isOwner" (click)="togglePrivacy(); $event.stopPropagation()" class="px-2 py-1 rounded-full text-white"
                    [ngClass]="playlist?.visibility === 'PUBLIC' ? 'bg-green-600' : 'bg-yellow-600'">
                    {{ playlist?.visibility === 'PUBLIC' ? 'Public' : 'Private' }}
                </button>
            </div>

            <button *ngIf="isOwner" (click)="enableEdit()" class="mt-4 bg-gray-700 px-4 py-2 rounded-full hover:bg-gray-600 transition">
                ✏️ Edit Playlist
            </button>

            }

            @if (editMode) {

            <div class="space-y-4 mt-4">

                <input type="text" [(ngModel)]="editData.name"
                    class="w-full p-2 bg-surfaceDark rounded-lg border border-gray-600" placeholder="Playlist Name" />

                <textarea [(ngModel)]="editData.description"
                    class="w-full p-2 bg-surfaceDark rounded-lg border border-gray-600"
                    placeholder="Playlist Description">
    </textarea>

                <label class="flex items-center gap-3">
                    <input type="checkbox" [checked]="editData.visibility === 'PUBLIC'"
                        (change)="editData.visibility = $event.target.checked ? 'PUBLIC' : 'PRIVATE'" class="w-4 h-4" />
                    Public Playlist
                </label>

                <div class="flex gap-4">

                    <button (click)="saveUpdate()"
                        class="bg-green-600 px-4 py-2 rounded-full hover:bg-green-700 transition">
                        💾 Save
                    </button>

                    <button (click)="cancelEdit()"
                        class="bg-gray-600 px-4 py-2 rounded-full hover:bg-gray-500 transition">
                        Cancel
                    </button>

                </div>

            </div>

            }

            <button (click)="playAll()" class="mt-6 bg-green-600 px-6 py-2 rounded-full hover:bg-green-700 transition">
                ▶ Play All
            </button>

            <button (click)="showSongs = !showSongs"
                class="mt-4 bg-gray-700 px-5 py-2 rounded-full hover:bg-gray-600 transition">
                {{ showSongs ? 'Hide Songs' : 'See Songs' }}
            </button>

        </div>

    </div>

    <!-- Songs Table -->
    @if (showSongs) {

    <div class="mt-10 space-y-3">

        @for (song of songs; track song.id) {

        <div class="flex items-center justify-between bg-surfaceDark p-4 rounded-lg hover:bg-surfaceLight transition">

            <div class="flex items-center gap-4">

                <button (click)="play(song)" class="bg-green-500 p-2 rounded-full text-black">

                    @if (currentSong?.id === song.id && isPlaying) {
                    ❚❚
                    } @else {
                    ▶
                    }

                </button>

                <div>
                    <p class="font-semibold">{{ song.title }}</p>
                    <p class="text-gray-400 text-sm">{{ song.artistName }}</p>
                </div>

            </div>

            <button *ngIf="isOwner" (click)="removeSong(song.id)" class="text-red-500 text-sm">
                Remove
            </button>

        </div>

        }

    </div>
    }
    <!-- } -->

</div>
