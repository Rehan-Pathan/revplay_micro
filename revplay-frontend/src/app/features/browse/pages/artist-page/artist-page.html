<div class="p-8 text-white">

    <!-- PAGE TITLE -->
    <div class="mb-8">
        <h1 class="text-3xl font-bold">Browse by Artist</h1>
        <p class="text-gray-400">Select an artist to view songs</p>
    </div>

    <!-- DROPDOWN SECTION -->
    <div class="flex gap-4 mb-10">

        <select [(ngModel)]="selectedArtistId" class="input-style bg-surfaceDark w-64">

            <option [ngValue]="null">Select Artist</option>

            @for (artist of artists; track artist.id) {
            <option [ngValue]="artist.id">
                {{ artist.artistName }}
            </option>
            }

        </select>

        <button (click)="loadSongs()" class="px-6 py-2 bg-green-600 hover:bg-green-700 rounded-md">
            Browse
        </button>

    </div>

    <!-- SONG LIST -->
    @if (songs.length > 0) {

    <div class="space-y-4">

        @for (song of songs; track song.id) {

        <div class="bg-surfaceDark p-5 rounded-lg flex justify-between items-center">

            <div>
                <h3 class="font-semibold text-lg">
                    {{ song.title }}
                </h3>
                <p class="text-gray-400 text-sm">
                    {{ song.genre }} • {{ song.releaseDate }}
                </p>
            </div>

            <button (click)="play(song)" class="bg-green-500 p-2 rounded-full text-black hover:bg-green-600 transition">

            @if (currentSong?.id === song.id && isPlaying) {
            ❚❚
            } @else {
            ▶
            }

        </button>

        </div>

        }

    </div>

    }

</div>
