<div class="p-6">

    <h2 class="text-2xl font-bold text-white mb-6">
        Your Favorite Songs ❤️
    </h2>

    @if (loading) {
    <div class="flex justify-center mt-20">
        <div class="w-6 h-6 border-4 border-green-500 border-t-transparent rounded-full animate-spin"></div>
    </div>
    }

    @if (!loading && songs.length === 0) {
    <p class="text-gray-400 mt-10">
        No favorite songs yet.
    </p>
    }

    <div class="grid grid-cols-5 gap-6">

        @for (song of songs; track song.id) {

        <div class="relative bg-surfaceDark p-4 rounded-lg hover:bg-surfaceLight transition">

            <img [src]="song.coverImage" class="w-full h-40 object-cover rounded-md mb-3" />

            <h3 class="text-white font-semibold truncate">
                {{ song.title }}
            </h3>

            <p class="text-gray-400 text-sm truncate">
                {{ song.artistName }}
            </p>

            <button (click)="toggleSong(song)" class="absolute bottom-4 right-4 bg-green-500 p-3 rounded-full shadow-lg">

                @if (currentSong?.id === song.id && isPlaying) {
                ❚❚
                } @else {
                ▶
                }

            </button>

        </div>

        }

    </div>

</div>
