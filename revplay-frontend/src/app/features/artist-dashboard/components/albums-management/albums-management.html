<!-- ============================= -->
<!-- CREATE ALBUM -->
<!-- ============================= -->
<div class="bg-surfaceDark p-6 rounded-lg text-white mb-10">

    <h2 class="text-xl font-bold mb-6">Create Album</h2>

    <form [formGroup]="form" class="space-y-4">

        <input type="text" formControlName="name" placeholder="Album Name" class="input-style" />

        <textarea formControlName="description" placeholder="Description" class="input-style">
    </textarea>

        <input type="date" formControlName="releaseDate" class="input-style" />

        <div>
            <label class="text-sm text-gray-400">Cover Image</label>
            <input type="file" accept="image/*" (change)="onCoverSelected($event)" class="text-white" />
        </div>

        <button type="button" (click)="createAlbum()" [disabled]="creating"
            class="px-6 py-2 bg-green-600 hover:bg-green-700 rounded-md">

            {{ creating ? 'Creating...' : 'Create Album' }}

        </button>

    </form>

</div>


<!-- ============================= -->
<!-- ALBUM LIST -->
<!-- ============================= -->
<div class="text-white">

    <h2 class="text-xl font-bold mb-4">Your Albums</h2>

    <div *ngIf="albums.length === 0" class="text-gray-400">
        No albums yet.
    </div>

    @for (album of albums; track album.id) {

    <div class="bg-surfaceDark p-4 rounded-lg mb-4">

        <!-- NORMAL VIEW -->
        @if (editingAlbumId !== album.id) {

        <div class="flex justify-between items-center">

            <div>
                <h3 class="font-bold">{{ album.name }}</h3>
                <p class="text-gray-400 text-sm">
                    {{ album.releaseDate }}
                </p>
            </div>

            <div class="flex gap-3">

                <button (click)="startEdit(album)" class="px-3 py-1 bg-blue-600 hover:bg-blue-700 rounded">
                    Edit
                </button>

                <button (click)="deleteAlbum(album.id)" class="px-3 py-1 bg-red-600 hover:bg-red-700 rounded">
                    Delete
                </button>

            </div>

        </div>

        <!-- ============================= -->
        <!-- ADD SONG TO THIS ALBUM -->
        <!-- ============================= -->

        <div class="mt-4">

            <select [(ngModel)]="selectedSongId" class="input-style bg-surfaceDark">

                <option [ngValue]="null">Select Song</option>

                @for (song of songs; track song.id) {
                <option [ngValue]="song.id">
                    {{ song.title }}
                </option>
                }

            </select>

            <button (click)="addSong(album.id)" class="ml-2 px-3 py-1 bg-green-600 rounded">
                Add Song
            </button>

        </div>

        <!-- ============================= -->
        <!-- SONGS INSIDE THIS ALBUM -->
        <!-- ============================= -->

        <div class="mt-4 space-y-2">

            @for (song of album.songs; track song.id) {

            <div class="flex justify-between items-center bg-gray-800 p-2 rounded">

                <span>{{ song.title }}</span>

                <button (click)="removeSong(album.id, song.id)" class="px-2 py-1 bg-red-600 rounded text-xs">
                    Remove
                </button>

            </div>

            }

        </div>

        }

        <!-- EDIT MODE -->
        @if (editingAlbumId === album.id) {

        <div class="space-y-4 mt-4">
            <div class="space-y-4 mt-4" [formGroup]="editForm">

                <input type="text" formControlName="name" class="input-style" placeholder="Album Name" />

                <textarea formControlName="description" class="input-style" placeholder="Description">
                </textarea>

            </div>

            <div>
                <label class="text-sm text-gray-400">New Cover (optional)</label>
                <input type="file" accept="image/*" (change)="onUpdateCoverSelected($event)" class="text-white" />
            </div>

            <div class="flex gap-4">

                <button (click)="saveAlbumUpdate()" class="px-4 py-2 bg-green-600 hover:bg-green-700 rounded-md">
                    Save
                </button>

                <button (click)="editingAlbumId = null" class="px-4 py-2 bg-gray-600 hover:bg-gray-700 rounded-md">
                    Cancel
                </button>

            </div>

        </div>

        }

    </div>

    }

</div>
