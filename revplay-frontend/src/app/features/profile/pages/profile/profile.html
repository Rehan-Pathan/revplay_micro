<div class="max-w-2xl mx-auto mt-10 bg-surfaceDark p-8 rounded-lg shadow-lg text-white">

  <!-- VIEW MODE -->
  @if (!editMode) {

    <div class="flex items-center gap-6">

      @if (profile?.profilePicture) {
        <img
          [src]="profile.profilePicture"
          class="w-24 h-24 rounded-full object-cover border border-gray-600"
        />
      }

      <div>
        <h2 class="text-2xl font-bold">
          {{ firstName}}
        </h2>

        <p class="text-gray-400">
          @{{ profile?.username }}
        </p>

        <p class="mt-2 text-sm text-gray-300">
          {{ profile?.bio }}
        </p>

        <p class="mt-1 text-sm text-gray-400">
          {{ profile?.email }}
        </p>
      </div>

    </div>

    <button
      (click)="toggleEdit()"
      class="mt-6 px-4 py-2 bg-green-600 hover:bg-green-700 rounded-md">
      Edit Profile
    </button>

  }

  <!-- EDIT MODE -->
  @if (editMode) {

    <form [formGroup]="editForm" class="space-y-4">

      <input
        type="text"
        formControlName="username"
        class="input-style"
        placeholder="Username"
      />

      <textarea
        formControlName="bio"
        class="input-style"
        placeholder="Bio">
      </textarea>

      <input
        type="file"
        (change)="onFileSelected($event)"
        class="text-white"
      />

      <div class="flex gap-4">

        <button
          type="button"
          (click)="saveChanges()"
          class="px-4 py-2 bg-green-600 hover:bg-green-700 rounded-md">
          Save
        </button>

        <button
          type="button"
          (click)="toggleEdit()"
          class="px-4 py-2 bg-gray-600 hover:bg-gray-700 rounded-md">
          Cancel
        </button>

      </div>

    </form>

  }

</div>
