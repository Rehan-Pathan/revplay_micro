<div class="text-white">

    <!-- Header -->
    <div class="mb-6">
        <h1 class="text-3xl font-bold">Artist Dashboard</h1>
        <p class="text-gray-400">Manage your music and analytics</p>
    </div>

    <!-- Navigation Tabs -->
    <div class="flex gap-6 border-b border-gray-700 mb-6">

        <button (click)="setTab('overview')" [ngClass]="activeTab === 'overview'
      ? 'text-white border-b-2 border-green-500 pb-2'
      : 'text-gray-400 hover:text-white pb-2'">
            Overview
        </button>

        <button (click)="setTab('songs')" [ngClass]="activeTab === 'songs'
      ? 'text-white border-b-2 border-green-500 pb-2'
      : 'text-gray-400 hover:text-white pb-2'">
            Songs
        </button>

        <button (click)="setTab('albums')" [ngClass]="activeTab === 'albums'
      ? 'text-white border-b-2 border-green-500 pb-2'
      : 'text-gray-400 hover:text-white pb-2'">
            Albums
        </button>

        <button (click)="setTab('analytics')" [ngClass]="activeTab === 'analytics'
      ? 'text-white border-b-2 border-green-500 pb-2'
      : 'text-gray-400 hover:text-white pb-2'">
            Analytics
        </button>

        <button (click)="setTab('listeners')" [ngClass]="activeTab === 'listeners'
      ? 'text-white border-b-2 border-green-500 pb-2'
      : 'text-gray-400 hover:text-white pb-2'">
            Top Listeners
        </button>

        <button (click)="setTab('favorites')" [ngClass]="activeTab === 'favorites'
      ? 'text-white border-b-2 border-green-500 pb-2'
      : 'text-gray-400 hover:text-white pb-2'">
            Favorited Users
        </button>

    </div>

    <!-- Dynamic Content -->
    <div>

        @if (activeTab === 'overview') {
        <app-dashboard-overview></app-dashboard-overview>
        }

        @if (activeTab === 'songs') {
        <app-songs-management></app-songs-management>
        }

        @if (activeTab === 'albums') {
        <app-albums-management></app-albums-management>
        }

        @if (activeTab === 'analytics') {
        <app-analytics></app-analytics>
        }

        @if (activeTab === 'listeners') {
        <app-listeners></app-listeners>
        }
        @if (activeTab === 'favorites') {
        <app-favorited-users></app-favorited-users> 
        }

    </div>

</div>
