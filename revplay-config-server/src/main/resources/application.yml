# ── server ──────────────────────────────────────────
server:
    port: 8888

  # ── identity ────────────────────────────────────────
spring:
  application:
    name: CONFIG-SERVER

    # ── switch to native (local folder) mode ──────────
  profiles:
    active: native

  cloud:
    config:
      server:
          # ── read yml files from this folder ─────────
        native:
          search-locations: classpath:/properties/

  # ── eureka registration ──────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

  # ── logging ──────────────────────────────────────────
logging:
  level:
    org.springframework.cloud.config: DEBUG

  # ── health endpoints ─────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
