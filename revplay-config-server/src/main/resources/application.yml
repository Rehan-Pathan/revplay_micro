server:
  port: 8888

spring:
  application:
    name: CONFIG-SERVER

  profiles:
    active: composite        # ← change from 'native' to 'composite'

  cloud:
    config:
      server:
        composite:
          # ── GitHub (primary source) ──────────────────
          - type: git
            uri: https://github.com/Rehan-Pathan/revplay_micro
            search-paths: revplay-config-server/src/main/resources/properties
            default-label: main
            clone-on-start: true

          # ── Local fallback ───────────────────────────
          - type: native
            search-locations: classpath:/properties/

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.config: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
