server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/revplay_catalog_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

logging:
  level:
    org.springframework.security: DEBUG

jwt:
  expiration: 86400000